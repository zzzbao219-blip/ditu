name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf libtool pkg-config \
            python3-dev python3-pip python3-venv \
            libssl-dev libffi-dev zlib1g-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libgstreamer1.0-dev gstreamer1.0-plugins-base \
            gcc git unzip zip lld

      - name: Install buildozer & cython
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install cython buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v3-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-v3-

      - name: Debug - show buildozer location
        run: |
          which buildozer
          buildozer version
          cat buildozer.spec

      - name: Build APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          buildozer -v android debug 2>&1 | tee build.log
          echo "=== BUILD FINISHED ==="
          ls -la bin/ || echo "bin/ directory does not exist"

      - name: Show tail of build log on failure
        if: failure()
        run: tail -100 build.log

      - name: Upload APK
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: positionsetting-debug
          path: bin/*.apk
          if-no-files-found: warn
